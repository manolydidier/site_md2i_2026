
<div id="hero3d" style="width:100%;height:100vh;min-height:600px;position:relative;background:#060608;overflow:hidden;font-family:'DM Sans',Inter,sans-serif;">

<canvas id="c3d" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>

<div id="overlay" style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(1.5rem,6vw,5rem);pointer-events:none;z-index:10;">
  <div id="eyebrow" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(239,159,39,.65);margin-bottom:1rem;transition:opacity .5s,transform .5s;"></div>
  <h1 id="title" style="font-size:clamp(28px,4.5vw,58px);font-weight:700;line-height:1.1;color:#fff;margin:0 0 1rem;max-width:640px;transition:opacity .5s,transform .5s;"></h1>
  <p id="desc" style="font-size:clamp(14px,1.5vw,16px);color:rgba(255,255,255,.55);max-width:480px;line-height:1.7;margin:0 0 2rem;transition:opacity .5s,transform .5s;"></p>
  <div id="btns" style="display:flex;gap:12px;flex-wrap:wrap;pointer-events:auto;transition:opacity .5s,transform .5s;"></div>
</div>

<div id="steps" style="position:absolute;right:clamp(1rem,3vw,2.5rem);top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:20;"></div>

<div id="progress-bar" style="position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#EF9F27,#d4891a);width:0%;transition:width .4s ease;z-index:20;"></div>

<div id="scroll-hint" style="position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;opacity:.5;">
  <span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#fff;">Scroll</span>
  <div style="width:1px;height:32px;background:linear-gradient(to bottom,rgba(239,159,39,.8),transparent);animation:scrollPulse 1.8s ease-in-out infinite;"></div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
@keyframes scrollPulse{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.2)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.step-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);cursor:pointer;transition:all .3s;background:transparent;}
.step-dot.active{background:#EF9F27;border-color:#EF9F27;box-shadow:0 0 10px rgba(239,159,39,.5);}
.hero-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .2s,filter .15s;text-decoration:none;border:none;font-family:inherit;}
.hero-btn.primary{background:linear-gradient(135deg,#EF9F27,#c47d10);color:#fff;box-shadow:0 4px 20px rgba(239,159,39,.25);}
.hero-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(239,159,39,.4);filter:brightness(1.06);}
.hero-btn.secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.15);}
.hero-btn.secondary:hover{background:rgba(255,255,255,.1);color:#fff;transform:translateY(-1px);}
</style>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SLIDES = [
  {
    eyebrow: "Cabinet IT — Paris 1987 — 54 pays",
    title: "Solutions <span style='color:#EF9F27'>digitales</span> pour projets de développement international",
    desc: "Logiciels de gestion financière, conseil et formation pour organisations internationales. Partenaires du FED et de l'UE depuis plus de 35 ans.",
    btns: [{label:"Découvrir SARA",cls:"primary"},{label:"Nous contacter",cls:"secondary"}],
    object: "network",
    color: 0xEF9F27,
  },
  {
    eyebrow: "Logiciels sur mesure",
    title: "Développement <span style='color:#EF9F27'>applicatif</span> et systèmes d'information",
    desc: "Architectures cloud, microservices et APIs REST. De la conception au déploiement, nous construisons des solutions robustes et scalables.",
    btns: [{label:"Nos solutions",cls:"primary"},{label:"Voir le portfolio",cls:"secondary"}],
    object: "cube",
    color: 0x4fa3e0,
  },
  {
    eyebrow: "Cybersécurité & Infrastructure",
    title: "Protégez vos données avec une <span style='color:#EF9F27'>expertise</span> reconnue",
    desc: "Audit de sécurité, mise en conformité RGPD, et infrastructure haute disponibilité. Votre système d'information entre de bonnes mains.",
    btns: [{label:"Audit gratuit",cls:"primary"},{label:"En savoir plus",cls:"secondary"}],
    object: "shield",
    color: 0x3dd68c,
  },
  {
    eyebrow: "Formation & Conseil",
    title: "Montée en compétences <span style='color:#EF9F27'>digitale</span> de vos équipes",
    desc: "Programmes de formation sur mesure, coaching agile et accompagnement transformation digitale. 54 pays, 3 langues, une expertise unique.",
    btns: [{label:"Nos formations",cls:"primary"},{label:"Contactez-nous",cls:"secondary"}],
    object: "dna",
    color: 0xb06ae0,
  }
];

const canvas = document.getElementById('c3d');
const W = () => canvas.clientWidth, H = () => canvas.clientHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55,1,.1,100);
camera.position.set(0,0,5);

const ambLight = new THREE.AmbientLight(0xffffff,.4);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff,.8);
dirLight.position.set(3,5,3);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xEF9F27,1.5,12);
pointLight.position.set(-3,2,2);
scene.add(pointLight);

let currentObj = null;
let targetObj = null;
let currentSlide = 0;
let transitioning = false;
let autoRotateX = 0, autoRotateY = 0;
let mouse = {x:0, y:0};

function buildNetwork(color) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color, metalness:.6, roughness:.3});
  const wmat = new THREE.LineBasicMaterial({color, opacity:.25, transparent:true});
  const nodes = [];
  for(let i=0;i<18;i++){
    const geo = new THREE.SphereGeometry(i===0?.18:.10,16,16);
    const mesh = new THREE.Mesh(geo, mat.clone());
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI;
    const r = i===0?0:(.8+Math.random()*1.2);
    mesh.position.set(
      i===0?0:r*Math.sin(phi)*Math.cos(theta),
      i===0?0:r*Math.sin(phi)*Math.sin(theta),
      i===0?0:r*Math.cos(phi)
    );
    nodes.push(mesh.position.clone());
    g.add(mesh);
  }
  nodes.forEach((a,i)=>nodes.forEach((b,j)=>{
    if(j>i && a.distanceTo(b)<1.2){
      const geo = new THREE.BufferGeometry().setFromPoints([a,b]);
      g.add(new THREE.Line(geo,wmat));
    }
  }));
  return g;
}

function buildCube(color) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color, metalness:.7, roughness:.2, wireframe:false});
  const wmat = new THREE.MeshStandardMaterial({color:0xffffff, metalness:.1, roughness:.8, wireframe:true, opacity:.08, transparent:true});
  [[1.4,0.05,1.4,0,0.7,0],[1.4,0.05,1.4,0,-0.7,0],[0.05,1.4,1.4,.7,0,0],[0.05,1.4,1.4,-.7,0,0],[1.4,1.4,0.05,0,0,.7],[1.4,1.4,0.05,0,0,-.7]].forEach(([w,h,d,x,y,z])=>{
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat.clone());
    const wire = new THREE.Mesh(new THREE.BoxGeometry(w+.01,h+.01,d+.01), wmat);
    mesh.position.set(x,y,z);
    wire.position.set(x,y,z);
    g.add(mesh, wire);
  });
  const innerMat = new THREE.MeshStandardMaterial({color, metalness:.9, roughness:.1, opacity:.15, transparent:true});
  g.add(new THREE.Mesh(new THREE.BoxGeometry(1.3,1.3,1.3), innerMat));
  return g;
}

function buildShield(color) {
  const g = new THREE.Group();
  const shape = new THREE.Shape();
  shape.moveTo(0,1.4);
  shape.bezierCurveTo(.9,1.2,1.1,.5,1.1,0);
  shape.bezierCurveTo(1.1,-.6,.6,-1.1,0,-1.4);
  shape.bezierCurveTo(-.6,-1.1,-1.1,-.6,-1.1,0);
  shape.bezierCurveTo(-1.1,.5,-.9,1.2,0,1.4);
  const extSettings = {depth:.25, bevelEnabled:true, bevelThickness:.06, bevelSize:.04, bevelSegments:4};
  const mat = new THREE.MeshStandardMaterial({color, metalness:.8, roughness:.2});
  const base = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, extSettings), mat);
  base.position.z = -.12;
  g.add(base);
  const ringMat = new THREE.MeshStandardMaterial({color:0xffffff, opacity:.12, transparent:true, metalness:1});
  for(let i=0;i<3;i++){
    const ring = new THREE.Mesh(new THREE.TorusGeometry(.35+i*.35, .02, 12, 64), ringMat.clone());
    ring.position.z = .14;
    g.add(ring);
  }
  const lockMat = new THREE.MeshStandardMaterial({color:0xffffff, metalness:.5, roughness:.4});
  const lock = new THREE.Mesh(new THREE.BoxGeometry(.25,.3,.15), lockMat);
  lock.position.set(0,-.1,.2);
  g.add(lock);
  const arch = new THREE.Mesh(new THREE.TorusGeometry(.12,.045,12,32,Math.PI), lockMat.clone());
  arch.position.set(0,.05,.2);
  g.add(arch);
  return g;
}

function buildDNA(color) {
  const g = new THREE.Group();
  const mat1 = new THREE.MeshStandardMaterial({color, metalness:.5, roughness:.3});
  const mat2 = new THREE.MeshStandardMaterial({color:0xffffff, metalness:.3, roughness:.5, opacity:.5, transparent:true});
  const crossMat = new THREE.MeshStandardMaterial({color:0xffffff, opacity:.3, transparent:true, metalness:.7});
  const N = 28;
  for(let i=0;i<N;i++){
    const t = (i/N)*Math.PI*4;
    const y = (i/N)*3.2-1.6;
    const x1 = Math.cos(t)*.8, z1 = Math.sin(t)*.8;
    const x2 = Math.cos(t+Math.PI)*.8, z2 = Math.sin(t+Math.PI)*.8;
    const s1 = new THREE.Mesh(new THREE.SphereGeometry(.09,12,12), i%3===0?mat1.clone():mat2.clone());
    const s2 = new THREE.Mesh(new THREE.SphereGeometry(.09,12,12), i%3!==0?mat1.clone():mat2.clone());
    s1.position.set(x1,y,z1); s2.position.set(x2,y,z2);
    g.add(s1, s2);
    if(i%3===0){
      const mid = new THREE.Vector3((x1+x2)/2,y,(z1+z2)/2);
      const dir = new THREE.Vector3(x2-x1,0,z2-z1);
      const len = dir.length();
      const cyl = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,len,8), crossMat);
      cyl.position.copy(mid);
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
      g.add(cyl);
    }
  }
  return g;
}

function makeObject(type, color) {
  switch(type){
    case 'network': return buildNetwork(color);
    case 'cube': return buildCube(color);
    case 'shield': return buildShield(color);
    case 'dna': return buildDNA(color);
  }
}

function setContent(idx, instant) {
  const s = SLIDES[idx];
  const els = ['eyebrow','title','desc','btns'];
  if(!instant) els.forEach(id=>{
    const el = document.getElementById(id);
    el.style.opacity='0'; el.style.transform='translateY(16px)';
  });
  setTimeout(()=>{
    document.getElementById('eyebrow').textContent = s.eyebrow;
    document.getElementById('title').innerHTML = s.title;
    document.getElementById('desc').textContent = s.desc;
    const btnsEl = document.getElementById('btns');
    btnsEl.innerHTML = s.btns.map(b=>`<button class="hero-btn ${b.cls}">${b.label}</button>`).join('');
    if(!instant) {
      els.forEach((id,i)=>{
        const el = document.getElementById(id);
        setTimeout(()=>{
          el.style.transition='opacity .5s, transform .5s';
          el.style.opacity='1'; el.style.transform='translateY(0)';
        }, i*80);
      });
    }
    document.getElementById('progress-bar').style.width = ((idx/(SLIDES.length-1))*100)+'%';
    document.querySelectorAll('.step-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  }, instant?0:300);
}

function transitionTo(idx) {
  if(transitioning || idx===currentSlide) return;
  transitioning = true;
  const s = SLIDES[idx];
  setContent(idx, false);

  const newObj = makeObject(s.object, s.color);
  newObj.scale.set(0,0,0);
  scene.add(newObj);

  if(currentObj) {
    const old = currentObj;
    let t = 0;
    const exitDir = idx > currentSlide ? 1 : -1;
    const fade = setInterval(()=>{
      t += .06;
      old.rotation.y += .05 * exitDir;
      old.scale.setScalar(Math.max(0,1-t));
      if(t>=1){ scene.remove(old); clearInterval(fade); }
    },16);
  }

  let tin = 0;
  const enter = setInterval(()=>{
    tin += .05;
    newObj.scale.setScalar(Math.min(1, tin));
    if(tin>=1){ clearInterval(enter); transitioning=false; }
  },16);

  currentObj = newObj;
  currentSlide = idx;

  pointLight.color.setHex(s.color);
  dirLight.color.setHex(s.color);
  dirLight.intensity = .5;
  setTimeout(()=>{ dirLight.color.setHex(0xffffff); dirLight.intensity=.8; },800);
}

const steps = document.getElementById('steps');
SLIDES.forEach((_,i)=>{
  const d = document.createElement('div');
  d.className = 'step-dot' + (i===0?' active':'');
  d.onclick = ()=>transitionTo(i);
  steps.appendChild(d);
});

let lastY = 0, scrollLock = false;
window.addEventListener('wheel', e=>{
  if(scrollLock) return;
  if(Math.abs(e.deltaY)<20) return;
  scrollLock = true;
  setTimeout(()=>scrollLock=false, 800);
  if(e.deltaY>0 && currentSlide<SLIDES.length-1) transitionTo(currentSlide+1);
  else if(e.deltaY<0 && currentSlide>0) transitionTo(currentSlide-1);
}, {passive:true});

let touchStartY = 0;
window.addEventListener('touchstart', e=>{ touchStartY = e.touches[0].clientY; });
window.addEventListener('touchend', e=>{
  const dy = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(dy)<50) return;
  if(dy>0 && currentSlide<SLIDES.length-1) transitionTo(currentSlide+1);
  else if(dy<0 && currentSlide>0) transitionTo(currentSlide-1);
});

window.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/window.innerWidth-.5)*2;
  mouse.y = -(e.clientY/window.innerHeight-.5)*2;
});

function resize(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', resize);
resize();

currentObj = makeObject(SLIDES[0].object, SLIDES[0].color);
scene.add(currentObj);
setContent(0, true);

document.getElementById('scroll-hint').style.display = 'flex';

let clock = 0;
(function animate(){
  requestAnimationFrame(animate);
  clock += .008;
  if(currentObj){
    autoRotateY += .003;
    currentObj.rotation.y += autoRotateY * .12 + mouse.x * .004;
    currentObj.rotation.x += (mouse.y * .003 - currentObj.rotation.x) * .05;
    currentObj.position.y = Math.sin(clock)*.06;
    currentObj.position.x = Math.sin(clock*.7)*.03;
  }
  pointLight.position.x = Math.sin(clock*.5)*3;
  pointLight.position.y = Math.cos(clock*.4)*2;
  renderer.render(scene,camera);
  autoRotateY *= .98;
})();
</script>
